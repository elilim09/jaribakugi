<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자리 바꾸기</title>

<style>
  /* 기본 스타일 */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #4338ca;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 6px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
    --radius: 0.5rem;
  }
  
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #f8fafc;
    color: var(--gray-800);
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  h1, h2, h3 {
    color: var(--gray-800);
    margin-bottom: 1rem;
    font-weight: 600;
  }
  
  h1 {
    font-size: 1.5rem;
  }
  
  h2 {
    font-size: 1.25rem;
  }
  
  h3 {
    font-size: 1.1rem;
    margin-bottom: 0.75rem;
  }
  
  /* 버튼 스타일 */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  
  .btn-primary:hover {
    background: var(--primary-dark);
  }
  
  .btn-outline {
    background: white;
    border: 1px solid var(--gray-300);
    color: var(--gray-700);
  }
  
  .btn-outline:hover {
    background: var(--gray-100);
  }
  
  .btn-success {
    background: var(--success);
    color: white;
  }
  
  .btn-success:hover {
    background: #0ea371;
  }
  
  .btn-icon {
    width: 2.25rem;
    height: 2.25rem;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  
  /* 아이콘 */
  .icon {
    width: 1.25rem;
    height: 1.25rem;
    stroke-width: 2;
    stroke: currentColor;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  
  .icon-sm {
    width: 1rem;
    height: 1rem;
  }
  
  /* 레이아웃 */
  .app-container {
    display: flex;
    width: 100%;
    height: 100vh;
  }
  
  /* 사이드바 */
  .sidebar {
    background: white;
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--gray-200);
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    overflow-y: auto;
    z-index: 30;
    transition: transform 0.3s ease;
  }
  
  .sidebar-header {
    padding: 1.25rem;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .sidebar-content {
    flex: 1;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  
  .sidebar-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--gray-200);
    display: flex;
    gap: 0.5rem;
  }
  
  /* 메인 콘텐츠 */
  .main {
    flex: 1;
    padding: 1.5rem;
    margin-left: 320px;
    width: calc(100% - 320px);
    overflow-y: auto;
  }
  
  .main-header {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .action-bar {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  
  /* 폼 요소 */
  .form-group {
    margin-bottom: 1rem;
  }
  
  .form-label {
    display: block;
    font-size: 0.875rem;
    margin-bottom: 0.5rem;
    color: var(--gray-700);
    font-weight: 500;
  }
  
  .form-control {
    width: 100%;
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
    line-height: 1.5;
    border: 1px solid var(--gray-300);
    border-radius: var(--radius);
    transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
  }
  
  .form-control:focus {
    border-color: var(--primary-light);
    outline: 0;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
  }
  
  textarea.form-control {
    min-height: 100px;
    resize: vertical;
  }
  
  .input-group {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  
  /* 카드와 박스 */
  .card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 1rem;
    border: 1px solid var(--gray-200);
  }
  
  .card-header {
    padding: 1rem;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .card-body {
    padding: 1rem;
  }
  
  /* 탭 가로 분할 및 간격 */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--gray-200);
    margin-bottom: 1rem;
  }
  
  .tab-item {
    flex: 1;
    text-align: center;
    padding: 0.75rem 0.25rem;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  
  .tab-item.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  
  /* 자리배치 */
  .sections {
    display: flex;
    align-items: flex-start;
    gap: clamp(0.75rem, 2vw, 2rem);
    overflow-x: auto;
  }

  .section {
    background: white;
    padding: clamp(0.75rem, 1.5vw, 1.5rem);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    flex: 1 0 min(18rem, 100%);
    min-width: 12rem;
    transition: all 0.3s ease;
  }

  .section-title {
    text-align: center;
    margin-bottom: 1rem;
    color: var(--gray-700);
    font-size: clamp(0.95rem, 1.4vw, 1.125rem);
  }

  .desks {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .desk {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(0.375rem, 0.8vw, 1rem);
  }

  .desk-slot {
    min-height: clamp(4.5rem, 7vw, 6.25rem);
    display: grid;
    align-items: center;
    background: var(--gray-100);
    border-radius: var(--radius);
    padding: clamp(0.375rem, 0.8vw, 0.5rem);
    border: 2px dashed transparent;
    transition: border-color 0.2s, background 0.2s, border-radius 0.3s;
  }

  .desk-slot.drag-over {
    border-color: var(--primary);
    background: #eef2ff;
  }

  .seat {
    padding: clamp(0.45rem, 0.9vw, 0.75rem);
    border-radius: calc(var(--radius) - 0.125rem);
    background: white;
    box-shadow: var(--shadow-sm);
    font-weight: 500;
    font-size: clamp(0.75rem, 1vw, 1rem);
    cursor: grab;
    user-select: none;
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: center;
    gap: 0.5rem;
    min-width: 0;
    transition: all 0.2s, border-radius 0.3s;
    min-height: 3.5rem;
  }

  .seat-name {
    line-height: 1.35;
    text-align: center;
    white-space: normal;
    overflow-wrap: anywhere;
  }
  
  .seat:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  
  .seat.empty {
    background: transparent;
    box-shadow: none;
    cursor: default;
    min-height: 3.5rem;
  }
  
  /* 기본 덮기 스타일 */
  .seat.covered {
    background: linear-gradient(135deg, #4f46e5, #818cf8) !important;
    color: white !important;
    border: 2px solid #ffffff !important;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
    cursor: default;
    display: flex !important;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .seat.covered::after {
    content: "?";
  }

  .seat.covered .seat-name {
    display: none !important;
  }
  
  .lock-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--danger);
    flex-shrink: 0;
  }

  /* ==========================================================================
     ★ 테마 스타일별 테마 클래스 정의
     ========================================================================== */
  
  /* [1] 동글동글 디자인 (theme-round) */
  .theme-round .seat {
    border-radius: 2rem !important;
    border: 2px solid #e0e7ff;
  }
  .theme-round .desk-slot {
    border-radius: 2rem !important;
  }
  .theme-round .seat.covered {
    background: linear-gradient(135deg, #ec4899, #f43f5e) !important;
    border-radius: 2rem !important;
    border-color: #ffe4e6 !important;
  }

  /* [2] 네모네모 디자인 (theme-square) */
  .theme-square .section,
  .theme-square .desk-slot,
  .theme-square .seat {
    border-radius: 0px !important;
  }
  .theme-square .seat {
    border: 2px solid var(--gray-800);
    box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
  }
  .theme-square .seat.covered {
    background: #1f2937 !important;
    border: 2px solid var(--gray-800) !important;
    box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15) !important;
  }

  /* [3] 분필/칠판 디자인 (theme-chalkboard) */
  .theme-chalkboard .section {
    background: #064e3b !important;
    border: 5px solid #78350f !important; /* 나무 느낌 액자 테두리 */
    box-shadow: var(--shadow-lg);
  }
  .theme-chalkboard .section-title {
    color: #fef08a !important; /* 분필 느낌 노란색 */
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  }
  .theme-chalkboard .desk-slot {
    background: #047857 !important;
    border: 1.5px dashed rgba(255, 255, 255, 0.35) !important;
  }
  .theme-chalkboard .seat {
    background: #f8fafc;
    color: #1e293b;
    border: 2.5px solid #10b981;
    box-shadow: inset 0 -3px 0px rgba(0,0,0,0.08);
  }
  .theme-chalkboard .seat.covered {
    background: #064e3b !important;
    border: 2.5px dashed #fef08a !important;
    color: #fef08a !important;
    box-shadow: none !important;
  }
  
  /* 툴팁 */
  .tooltip {
    position: relative;
  }
  
  .tooltip:hover::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gray-800);
    color: white;
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-size: 0.75rem;
    white-space: nowrap;
    z-index: 10;
    margin-bottom: 0.5rem;
  }
  
  /* 모바일 반응형 */
  .mobile-toggle {
    display: none;
    background: var(--primary);
    color: white;
    width: 3rem;
    height: 3rem;
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    border-radius: 50%;
    cursor: pointer;
    z-index: 40;
    box-shadow: var(--shadow-lg);
    align-items: center;
    justify-content: center;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 20;
  }
  
  /* 알림 */
  .alert {
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    margin-bottom: 1rem;
    font-size: 0.875rem;
  }
  
  .alert-info {
    background: #e0f2fe;
    border: 1px solid #bae6fd;
    color: #0369a1;
  }
  
  .alert-warning {
    background: #fef3c7;
    border: 1px solid #fde68a;
    color: #9a3412;
  }
  
  /* 광고 스타일 */
  .ad-container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 5rem;
    margin-top: auto;
  }
  
  @media print {
    .noprint {
      display: none !important;
    }
    
    body {
      background: white;
      display: block;
    }
    
    .main {
      margin-left: 0;
      width: 100%;
      padding: 0;
    }
    
    .section {
      box-shadow: none;
      border: 1px solid var(--gray-300);
      page-break-inside: avoid;
    }

    .seat.locked {
      background: white !important;
      border: none !important;
      box-shadow: var(--shadow-sm) !important;
      color: inherit !important;
    }

    .seat.locked .lock-icon {
      color: inherit !important;
    }
  }
  
  /* 모바일 반응형 */
  @media (max-width: 1024px) {
    .sidebar {
      transform: translateX(-100%);
    }
    
    .sidebar.open {
      transform: translateX(0);
    }
    
    .main {
      margin-left: 0;
      width: 100%;
    }
    
    .mobile-toggle {
      display: flex;
    }

    .section {
      flex-basis: min(16rem, 80vw);
    }
    
    .sidebar-overlay.open {
      display: block;
    }
  }
  .app-container.hide-sidebar .sidebar {
    display: none !important;
  }
  .app-container.hide-sidebar .main {
    margin-left: 0 !important;
    width: 100% !important;
    padding: 2rem !important;
    background: white !important;
  }
.number-bar {
  display: none; /* 기본적으로 숨김 */
  flex-direction: column;
  gap: 0.1rem;
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--gray-200);
  width: fit-content;
  min-width: 120px;
}

.number-item {
  display: flex;
  align-items: center;
  background: var(--gray-100);
  border-radius: 0.25rem;
  font-size: 0.875rem;
  font-weight: 500;
  white-space: nowrap;
}

.number-item .student-name {
  color: var(--gray-700);
}

.number-item .student-number {
  color: var(--primary);
  font-weight: 600;
  min-width: 20px;
  text-align: center;
}

/* ==========================================================================
   ★ 이미지 저장용 스타일 (.for-image) 
   ========================================================================== */
.for-image .number-bar {
  display: flex !important;
  flex-direction: column;
  gap: 0;
  width: 200px;
  min-width: 180px;
  max-width: 220px;
  padding: 0;
  border: 2.5px solid #1e293b;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  background: #f8fafc;
  overflow: hidden;
  position: absolute !important;
  right: 1.2rem !important;
  top: 50% !important;
  transform: translateY(-50%) !important;
}

/* 번호바 헤더 */
.for-image .number-bar-header {
  display: flex !important;
  align-items: center;
  justify-content: center;
  background: #1e293b;
  color: white;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0.55rem 0.75rem;
  text-transform: uppercase;
}

/* 번호바 아이템 컨테이너 */
.for-image .number-bar-list {
  display: flex !important;
  flex-direction: column;
  gap: 0;
  padding: 0.5rem 0.6rem;
  flex: 1;
  overflow: hidden;
}

.for-image .number-item {
  display: flex !important;
  justify-content: flex-start;
  align-items: center;
  gap: 0.3rem;
  padding: 0.18rem 0.3rem;
  border: none;
  background: transparent;
  font-size: 0.8rem;
  font-weight: 500;
  white-space: nowrap;
  line-height: 1.4;
  width: 100%;
}

.for-image .number-item:nth-child(odd) {
  background: rgba(0,0,0,0.03);
  border-radius: 3px;
}

.for-image .number-item .student-number {
  color: #475569;
  min-width: 1.6rem;
  text-align: right;
  font-weight: 700;
  font-size: 0.78rem;
  flex-shrink: 0;
}

.for-image .number-item .student-number::after {
  content: ".";
}

.for-image .number-item .student-name {
  color: #1e293b;
  font-weight: 600;
  font-size: 0.82rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.for-image.main-content {
  display: flex !important;
  flex-direction: row !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 1.5rem !important;
  background: white !important;
  padding: 2rem !important;
  width: 100% !important;
}

.for-image .layout-container {
  order: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-left: calc(240px - 1.5rem) !important;
  margin-right: 0 !important;
  flex: none !important;
}

/* 저장 시 분단 텍스트 숨김 */
.for-image .section-title {
  display: none !important;
}

.for-image .number-bar {
  display: flex !important;
  flex-direction: column;
  gap: 0;
  width: 210px;
  min-width: 210px;
  max-width: 210px;
  padding: 0;
  border: 2.5px solid #1e293b;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  background: #f8fafc;
  overflow: hidden;
  flex-shrink: 0;
  order: 2;
  align-self: center;
  position: static !important;
  transform: none !important;
}

.export-lectern {
  display: none;
}

.for-image .export-lectern {
  display: flex;
  align-items: center;
  justify-content: center;
  width: min(28rem, 48%);
  min-height: 4.25rem;
  margin-top: 1.25rem;
  border-radius: 0;
  background: var(--gray-800);
  color: white;
  font-size: 1.6rem;
  font-weight: 600;
}

/* Flex 구조 뒤집기 */
.for-image .sections {
  flex-direction: row-reverse !important;
  overflow: visible !important;
  gap: 1.5rem !important;
  transform: none !important;
}

.for-image .desks {
  flex-direction: column-reverse !important;
}

.for-image .desk {
  display: flex !important;
  flex-direction: row-reverse !important;
}

.for-image .desk-slot {
  flex: 1 !important;
}

.for-image .seat-name,
.for-image .lock-icon {
  transform: none !important;
}
.for-image .lock-icon { display: none }
.main-content {
  display: flex;
  gap: 0.5rem;
  align-items: flex-start;
}

.layout-container {
  flex: 1;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body class="theme-default" id="appBody">
  <div class="app-container" id="appContainer">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <aside class="sidebar noprint" id="sidebar">
      <div class="sidebar-header">
        <h1>자리 바꾸기</h1>
        <button class="btn btn-icon btn-outline mobile-close" id="closeSidebar">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      
      <div class="sidebar-content">
        <div class="tabs">
          <div class="tab-item active" data-tab="settings">설정</div>
          <div class="tab-item" data-tab="style">스타일</div>
          <div class="tab-item" data-tab="students">학생</div>
          <div class="tab-item" data-tab="export">내보내기</div>
        </div>
        
        <div class="tab-content" id="settingsTab">
          <div class="alert alert-info" id="layoutInfo">
            분단 수와 학생 수에 맞춰 자리표를 자동으로 만듭니다.
          </div>

          <div class="form-group">
            <label class="form-label">분단 수</label>
            <input type="number" class="form-control" id="sectionCount" min="1" max="12" value="3">
          </div>

<script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
<script>
const LS_KEY = {
  NAMES : 'class_names',
  LOCK  : 'class_locked',
  SEATS : 'class_seats',
  SECTION_COUNT : 'class_section_count',
  ACTIVE_TAB: 'class_active_tab',
  THEME: 'class_theme'
};

let students   = JSON.parse(localStorage.getItem(LS_KEY.NAMES)  || '[]');
let lockedArr  = JSON.parse(localStorage.getItem(LS_KEY.LOCK)   || '[]');
if(students.length===0) students = Array.from({length:26},(_,i)=>`학생${i+1}`);
let seatArr = JSON.parse(localStorage.getItem(LS_KEY.SEATS) || '[]');
let activeTab = localStorage.getItem(LS_KEY.ACTIVE_TAB) || 'settings';
let studentGenders = JSON.parse(localStorage.getItem('class_genders') || '[]');
let genderPairMode = JSON.parse(localStorage.getItem('gender_pair_mode') || 'false');
let sectionCount = Number(localStorage.getItem(LS_KEY.SECTION_COUNT)) || 3;
let layoutShape = { sections: 3, rows: 1, seatsPerSection: 2, size: 6 };
let currentTheme = localStorage.getItem(LS_KEY.THEME) || 'default';

// 덮기 & 열기 제어 변수
let isCovered = false;
let revealedSet = new Set();
let revealInterval = null;

const rand = arr => { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };
const escapeHtml = value => String(value).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
const isEmptySeat = value => value === null || value === undefined || value === '';

function getAutoLayout(count){
  const safeCount = Math.max(1, count);
  const sections = Math.max(1, Math.min(12, Number(sectionCount) || 1));
  sectionCount = sections;
  const rows = Math.max(1, Math.ceil(safeCount / (sections * 2)));
  const seatsPerSection = rows * 2;
  return { sections, rows, seatsPerSection, size: sections * seatsPerSection };
}

function seatIndex(sec, row, side){
  return row * layoutShape.sections * 2 + sec * 2 + side;
}

function orderedStudentsFromSeats(){
  const used = new Set();
  const ordered = [];
  seatArr.forEach(name => {
    if(!isEmptySeat(name) && students.includes(name) && !used.has(name)) {
      ordered.push(name);
      used.add(name);
    }
  });
  students.forEach(name => {
    if(!used.has(name)) ordered.push(name);
  });
  return ordered;
}

function normalizeLayout(preferCurrentOrder=true){
  layoutShape = getAutoLayout(students.length);
  const source = preferCurrentOrder && seatArr.length ? orderedStudentsFromSeats() : [...students];
  const nextSeats = Array(layoutShape.size).fill(null);
  source.slice(0, students.length).forEach((name, i) => {
    nextSeats[i] = name;
  });
  seatArr = nextSeats;
  lockedArr = Array(layoutShape.size).fill(false);
}

function syncSeatSize(){
  layoutShape = getAutoLayout(students.length);
  if(!Array.isArray(seatArr) || seatArr.length === 0) {
    seatArr = [...students];
  }

  const valid = new Set(students);
  const seen = new Set();
  seatArr = seatArr.map(name => {
    if(isEmptySeat(name) || !valid.has(name) || seen.has(name)) return null;
    seen.add(name);
    return name;
  });

  students.forEach(name => {
    if(!seen.has(name)) {
      const emptyIndex = seatArr.findIndex(isEmptySeat);
      if(emptyIndex >= 0) seatArr[emptyIndex] = name;
      else seatArr.push(name);
      seen.add(name);
    }
  });

  if(seatArr.length < layoutShape.size) {
    seatArr.push(...Array(layoutShape.size - seatArr.length).fill(null));
  }
  if(seatArr.length > layoutShape.size) {
    const overflow = seatArr.slice(layoutShape.size).filter(name => !isEmptySeat(name));
    seatArr = seatArr.slice(0, layoutShape.size);
    overflow.forEach(name => {
      const emptyIndex = seatArr.findIndex(isEmptySeat);
      if(emptyIndex >= 0) seatArr[emptyIndex] = name;
    });
  }

  lockedArr = Array.from({length: layoutShape.size}, (_, i) => Boolean(lockedArr[i]) && !isEmptySeat(seatArr[i]));
}

function saveStorage(){
  localStorage.setItem(LS_KEY.NAMES , JSON.stringify(students));
  localStorage.setItem(LS_KEY.LOCK  , JSON.stringify(lockedArr));
  localStorage.setItem(LS_KEY.SEATS , JSON.stringify(seatArr));
  localStorage.setItem(LS_KEY.SECTION_COUNT, String(sectionCount));
  localStorage.setItem(LS_KEY.ACTIVE_TAB, activeTab);
  localStorage.setItem(LS_KEY.THEME, currentTheme);
}

function showNotification(msg,type='info'){
  const colors = {info:'#38bdf8',success:'#10b981',warning:'#f59e0b',danger:'#ef4444'};
  const div = document.createElement('div');
  div.className='alert noprint';
  div.style.background=`${colors[type]}20`;
  div.style.border=`1px solid ${colors[type]}80`;
  div.style.color=colors[type];
  div.style.position='fixed';
  div.style.top='1rem';
  div.style.right='1rem';
  div.style.zIndex='50';
  div.textContent=msg;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),2500);
}

function saveNames(){
  clearInterval(revealInterval);
  isCovered = false;
  revealedSet.clear();

  const inputLines = document.getElementById('nameInput').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(inputLines.length === 0) return showNotification('학생 이름을 한 명 이상 입력해주세요.','warning');

  const nameArr = [];
  const genderArr = [];
  
  inputLines.forEach(line => {
    const parts = line.split('/');
    const name = parts[0] ? parts[0].trim() : '빈칸';
    const genderNum = parts[1] ? parts[1].trim() : '1';
    nameArr.push(name);
    genderArr.push(genderNum === '2' ? '여' : '남');
  });
  
  students = [...nameArr];
  studentGenders = [...genderArr];
  genderPairMode = document.getElementById('genderPairMode').checked;
  normalizeLayout(false);
  
  localStorage.setItem('class_genders', JSON.stringify(studentGenders));
  localStorage.setItem('gender_pair_mode', JSON.stringify(genderPairMode));
  
  saveStorage(); 
  renderAll();
  showNotification('학생 이름과 성별이 저장되었습니다.','success');
}

function resetAutoLayout(){
  clearInterval(revealInterval);
  isCovered = false;
  revealedSet.clear();

  sectionCount = Math.max(1, Math.min(12, Number(document.getElementById('sectionCount').value) || 1));
  normalizeLayout(false);
  saveStorage(); renderAll();
  showNotification(`${sectionCount}분단으로 자동 재배치했습니다.`, 'success');
}

function arrangeByNumber(){
  clearInterval(revealInterval);
  isCovered = false;
  revealedSet.clear();

  const lockedNames = new Set(seatArr.filter((name, i) => lockedArr[i] && !isEmptySeat(name)));
  const unlockedStudents = students.filter(name => !lockedNames.has(name));
  let p = 0;
  seatArr = seatArr.map((name, i) => {
    if(lockedArr[i]) return name;
    return p < unlockedStudents.length ? unlockedStudents[p++] : null;
  });
  renderAll();
  saveStorage();
  showNotification('번호순으로 배치되었습니다.','success');
}

function shuffleSeats(){
  clearInterval(revealInterval);
  if (isCovered) {
    revealedSet.clear();
  }

  if(genderPairMode && studentGenders.length === students.length) {
    const maleStudents = [];
    const femaleStudents = [];

    seatArr.forEach((studentName, i) => {
      if(!lockedArr[i] && !isEmptySeat(studentName)) {
        const originalIndex = students.indexOf(studentName);
        if(originalIndex !== -1 && studentGenders[originalIndex] === '남') maleStudents.push(studentName);
        if(originalIndex !== -1 && studentGenders[originalIndex] === '여') femaleStudents.push(studentName);
      }
    });

    rand(maleStudents);
    rand(femaleStudents);

    const mixed = [];
    while(maleStudents.length && femaleStudents.length) {
      const pair = Math.random() < 0.5
        ? [maleStudents.pop(), femaleStudents.pop()]
        : [femaleStudents.pop(), maleStudents.pop()];
      mixed.push(...pair);
    }
    mixed.push(...rand([...maleStudents, ...femaleStudents]));

    let p = 0;
    seatArr = seatArr.map((name, i) => {
      if(lockedArr[i]) return name;
      return p < mixed.length ? mixed[p++] : null;
    });
  } else {
    const available = seatArr.filter((name,i)=>!lockedArr[i] && !isEmptySeat(name));
    rand(available);
    let p=0;
    for(let i=0;i<seatArr.length;i++) {
      if(!lockedArr[i]) seatArr[i]=p < available.length ? available[p++] : null;
    }
  }
  
  renderAll(); 
  saveStorage();
}

// 덮기 & 열기 전용 동작 함수들
function coverAllSeats() {
  clearInterval(revealInterval);
  isCovered = true;
  revealedSet.clear();
  renderAll();
}

function revealAllSeats() {
  clearInterval(revealInterval);
  isCovered = false;
  revealedSet.clear();
  renderAll();
}

function startSequentialReveal() {
  clearInterval(revealInterval);

  if (!isCovered) {
    isCovered = true;
    revealedSet.clear();
    renderAll();
  }

  const occupiedIndices = [];
  for (let row = 0; row < layoutShape.rows; row++) {
    for (let sec = 0; sec < layoutShape.sections; sec++) {
      for (let side = 0; side < 2; side++) {
        const idx = seatIndex(sec, row, side);
        if (!isEmptySeat(seatArr[idx])) {
          occupiedIndices.push(idx);
        }
      }
    }
  }

  const toReveal = occupiedIndices.filter(idx => !revealedSet.has(idx));
  if (toReveal.length === 0) {
    isCovered = false;
    renderAll();
    showNotification('모든 자리가 이미 열려 있습니다.', 'info');
    return;
  }

  let p = 0;
  revealInterval = setInterval(() => {
    if (p >= toReveal.length) {
      clearInterval(revealInterval);
      isCovered = false;
      revealedSet.clear();
      renderAll();
      showNotification('모든 자리가 열렸습니다.', 'success');
      return;
    }
    revealedSet.add(toReveal[p]);
    renderAll();
    p++;
  }, 300); // 0.3초 마다 순차 공개
}

/* ★ 테마(스타일) 변경 시스템 제어 함수 */
function applyTheme(themeName) {
  const appContainer = document.getElementById('appContainer');
  appContainer.classList.remove('theme-default', 'theme-round', 'theme-square', 'theme-chalkboard');
  appContainer.classList.add('theme-' + themeName);
  
  currentTheme = themeName;
  localStorage.setItem(LS_KEY.THEME, themeName);
  
  // 버튼 디자인 상태 동기화
  const themes = ['default', 'round', 'square', 'chalkboard'];
  themes.forEach(t => {
    const btn = document.getElementById('theme-btn-' + t);
    if(btn) {
      if(t === themeName) {
        btn.classList.remove('btn-outline');
        btn.classList.add('btn-primary');
      } else {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline');
      }
    }
  });
}

function changeTheme(themeName) {
  applyTheme(themeName);
  showNotification('배치표 디자인 스타일이 변경되었습니다.', 'success');
}

function renderAll(){
  syncSeatSize();
  const layout=document.getElementById('layout');
  layout.innerHTML='';

  for(let sec = 0; sec < layoutShape.sections; sec++) {
    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<h2 class="section-title">${sec + 1}분단</h2><div class="desks"></div>`;
    const desks = section.querySelector('.desks');

    for(let row = 0; row < layoutShape.rows; row++) {
      const desk = document.createElement('div');
      desk.className = 'desk';

      for(let side = 0; side < 2; side++) {
        const i = seatIndex(sec, row, side);
        const name = seatArr[i];
        const slot = document.createElement('div');
        slot.className = 'desk-slot';
        slot.dataset.index = i;

        if(isEmptySeat(name)) {
          slot.innerHTML = '<div class="seat empty" aria-label="빈 자리"></div>';
        } else {
          const isCurrentlyCovered = isCovered && !revealedSet.has(i);
          if (isCurrentlyCovered) {
            slot.innerHTML = `
              <div class="seat covered ${lockedArr[i]?'locked':''}" data-index="${i}">
                <!-- 이름 숨김 -->
              </div>`;
          } else {
            slot.innerHTML = `
              <div class="seat ${lockedArr[i]?'locked':''}" draggable="true" data-index="${i}">
                <span class="seat-name">${lockedArr[i]?'<span class="lock-icon" aria-hidden="true">&#128274;</span>':''}${escapeHtml(name)}</span>
              </div>`;
          }
        }

        desk.appendChild(slot);
      }
      desks.appendChild(desk);
    }
    layout.appendChild(section);
  }

  bindSeatEvents();
  renderNumberBar();
  document.getElementById('nameInput').value = students.map((name, i) => {
    const gender = studentGenders[i] === '여' ? '/2' : '/1';
    return `${name}${gender}`;
  }).join('\n');
  document.getElementById('genderPairMode').checked = genderPairMode;
  document.getElementById('sectionCount').value = layoutShape.sections;
  document.getElementById('layoutInfo').textContent =
    `${layoutShape.sections}분단, 분단별 ${layoutShape.rows}줄 기준, 남는 칸 ${layoutShape.size - students.length}개`;
}

function renderNumberBar(){
  const numberBar = document.getElementById('numberBar');
  numberBar.innerHTML = '';
  
  const header = document.createElement('div');
  header.className = 'number-bar-header';
  header.textContent = '학생 명단';
  numberBar.appendChild(header);

  const list = document.createElement('div');
  list.className = 'number-bar-list';

  for(let i = 0; i < students.length; i++) {
    const numberItem = document.createElement('div');
    numberItem.className = 'number-item';
    numberItem.innerHTML = `<span class="student-number">${i + 1}</span><span class="student-name">${escapeHtml(students[i])}</span>`;
    list.appendChild(numberItem);
  }
  numberBar.appendChild(list);
}

function bindSeatEvents(){
  document.querySelectorAll('.desk-slot').forEach(slot=>{
    const i=+slot.dataset.index;
    slot.ondragover=e=>{ if(!lockedArr[i]){ e.preventDefault(); slot.classList.add('drag-over'); } };
    slot.ondragleave=()=>slot.classList.remove('drag-over');
    slot.ondrop=e=>{
      slot.classList.remove('drag-over');
      const from=+e.dataTransfer.getData('text/plain');
      if(Number.isNaN(from)||from===i||lockedArr[i]) return;
      [seatArr[from],seatArr[i]]=[seatArr[i],seatArr[from]];
      [lockedArr[from],lockedArr[i]]=[lockedArr[i],lockedArr[from]];
      renderAll(); saveStorage();
    };
  });

  document.querySelectorAll('.seat').forEach(el=>{
    if(el.classList.contains('empty')) return;
    const i=+el.dataset.index;
    
    if (el.classList.contains('covered')) {
      el.ondragstart = e => e.preventDefault();
      el.onclick = null;
      return;
    }
    
    el.ondragstart=e=>{ if(lockedArr[i]){e.preventDefault();} else {e.dataTransfer.setData('text/plain',i);} };
    el.onclick=()=>{ lockedArr[i]=!lockedArr[i]; renderAll(); saveStorage(); };
  });
}

function saveAsCsv(){
  let csv='Section,Row,Seat,Name,Locked\n';
  seatArr.forEach((name, i)=>{
    const seatsPerRow = layoutShape.sections * 2;
    const row = Math.floor(i / seatsPerRow) + 1;
    const col = i % seatsPerRow;
    const section = Math.floor(col / 2) + 1;
    const side = col % 2 === 0 ? '왼' : '오';
    csv+=`${section},${row},${side},${isEmptySeat(name)?'':name},${lockedArr[i]?'Y':'N'}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download=`seat_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

async function captureExportCanvas(){
  const appContainer = document.getElementById('appContainer');
  const captureArea = document.getElementById('captureArea');
  const mainHeader = document.getElementById('mainHeader');
  const sidebar = document.getElementById('sidebar');
  
  // 저장 결과물 출력할 땐 항상 이름을 다 채워서 생성하도록 유도
  const originalIsCovered = isCovered;
  const originalRevealedSet = new Set(revealedSet);
  isCovered = false;
  revealedSet.clear();
  renderAll();

  appContainer.classList.add('hide-sidebar');
  captureArea.classList.add('for-image');
  mainHeader.style.setProperty('display', 'none', 'important');
  sidebar.style.setProperty('display', 'none', 'important');
  
  try {
    await new Promise(requestAnimationFrame);
    await new Promise(resolve => setTimeout(resolve, 300));
    
    const w = captureArea.scrollWidth;
    const h = captureArea.scrollHeight;

    return await html2canvas(captureArea, {
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      scale: 2,
      logging: false,
      width: w,
      height: h,
      scrollX: 0,
      scrollY: 0,
      windowWidth: w,
      windowHeight: h
    });
  } finally {
    isCovered = originalIsCovered;
    revealedSet = originalRevealedSet;
    renderAll();

    appContainer.classList.remove('hide-sidebar');
    captureArea.classList.remove('for-image');
    mainHeader.style.removeProperty('display');
    sidebar.style.removeProperty('display');
  }
}

async function saveAsImage(){
  const canvas = await captureExportCanvas();
  const link = document.createElement('a');
  link.download = `seat_${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function saveAsPdf(){
  const canvas=await captureExportCanvas();
  const pdf=new jspdf.jsPDF({orientation:'portrait',unit:'px',format:[canvas.width,canvas.height]});
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,canvas.width,canvas.height);
  pdf.save(`seat_${Date.now()}.pdf`);
}

function showTab(tab){
  activeTab=tab; saveStorage();
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display=(c.id===tab+'Tab')?'block':'none');
}

document.querySelectorAll('.tab-item').forEach(t=>t.onclick=()=>showTab(t.dataset.tab));

document.getElementById('sectionCount').onchange=()=>{
  clearInterval(revealInterval);
  isCovered = false;
  revealedSet.clear();

  sectionCount = Math.max(1, Math.min(12, Number(document.getElementById('sectionCount').value) || 1));
  syncSeatSize();
  renderAll();
  saveStorage();
  showNotification(`${sectionCount}분단으로 바꿨습니다.`, 'success');
};

const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('sidebarOverlay');
document.getElementById('openSidebar').onclick=()=>{sidebar.classList.add('open');overlay.classList.add('open');};
document.getElementById('closeSidebar').onclick=()=>{sidebar.classList.remove('open');overlay.classList.remove('open');};
overlay.onclick=()=>{sidebar.classList.remove('open');overlay.classList.remove('open');};

(function init(){
  syncSeatSize();
  applyTheme(currentTheme);
  renderAll();
  showTab(activeTab);
})();
</script>
